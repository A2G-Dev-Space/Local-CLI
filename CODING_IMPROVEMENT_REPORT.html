<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coding SubAgent Quality Report</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
    --text: #e0e0e6; --muted: #8b8fa3; --accent: #6c5ce7;
    --green: #00b894; --red: #e17055; --yellow: #fdcb6e; --blue: #74b9ff;
    --bugfix: #e17055; --feature: #0984e3; --refactor: #6c5ce7;
    --analysis: #00b894; --debug: #fdcb6e; --review: #e84393; --testing: #00cec9;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',-apple-system,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; overflow:hidden; height:100vh; }

  .topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 24px; background:var(--card); border-bottom:1px solid var(--border);
    position:fixed; top:0; left:0; right:0; z-index:100; height:56px;
  }
  .topbar h1 { font-size:1.1rem; font-weight:700; }
  .topbar .tabs { display:flex; gap:4px; flex-wrap:wrap; }
  .topbar .tab {
    padding:5px 12px; border-radius:8px; cursor:pointer;
    font-size:0.8rem; font-weight:600; border:1px solid var(--border);
    background:transparent; color:var(--muted); transition:all 0.2s;
  }
  .topbar .tab:hover { background:#ffffff08; }
  .topbar .tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .topbar .page-info { font-size:0.85rem; color:var(--muted); min-width:120px; text-align:right; }
  .topbar .lang-filter select {
    background:var(--card); color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:5px 10px; font-size:0.8rem; font-weight:600;
    cursor:pointer; outline:none;
  }
  .topbar .lang-filter select:hover { border-color:var(--accent); }
  .topbar .summary-badges { display:flex; gap:8px; align-items:center; }
  .topbar .badge { font-size:0.75rem; padding:3px 10px; border-radius:6px; font-weight:700; }
  .topbar .badge.pass { background:var(--green); color:#fff; }
  .topbar .badge.fail { background:var(--red); color:#fff; }
  .topbar .badge.untested { background:var(--border); color:var(--muted); }

  .main { margin-top:56px; height:calc(100vh - 56px); display:flex; }

  .sidebar {
    width:280px; min-width:280px; background:var(--card); border-right:1px solid var(--border);
    overflow-y:auto; padding:12px;
  }
  .sidebar .cat-label {
    font-size:0.7rem; font-weight:700; text-transform:uppercase;
    color:var(--muted); letter-spacing:0.06em; padding:10px 8px 4px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .sidebar .cat-label .cat-avg { font-size:0.7rem; font-weight:600; }
  .sidebar .scenario-item {
    display:flex; align-items:center; gap:8px;
    padding:7px 10px; border-radius:8px; cursor:pointer;
    font-size:0.82rem; color:var(--text); transition:all 0.15s; margin-bottom:1px;
  }
  .sidebar .scenario-item:hover { background:#ffffff08; }
  .sidebar .scenario-item.active { background:var(--accent); color:#fff; }
  .sidebar .scenario-item .num {
    width:22px; height:22px; border-radius:6px; display:flex;
    align-items:center; justify-content:center; font-size:0.7rem;
    font-weight:700; flex-shrink:0;
  }
  .sidebar .scenario-item .num.untested { background:#ffffff10; color:var(--muted); }
  .sidebar .scenario-item .num.pass { background:var(--green); color:#fff; }
  .sidebar .scenario-item .num.fail { background:var(--red); color:#fff; }
  .sidebar .scenario-item .num.mid { background:var(--yellow); color:#000; }
  .sidebar .scenario-item .label { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sidebar .scenario-item .diff {
    margin-left:auto; font-size:0.65rem; padding:2px 6px;
    border-radius:4px; font-weight:600; flex-shrink:0;
  }
  .sidebar .scenario-item .diff.easy { background:#00b89422; color:var(--green); }
  .sidebar .scenario-item .diff.medium { background:#fdcb6e22; color:var(--yellow); }
  .sidebar .scenario-item .diff.hard { background:#e1705522; color:var(--red); }

  .content-area { flex:1; overflow-y:auto; padding:32px 40px; }

  .page-card { max-width:1000px; margin:0 auto; }
  .page-card .cat-badge {
    display:inline-block; padding:4px 12px; border-radius:6px;
    font-size:0.8rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; margin-bottom:8px;
  }
  .page-card .diff-badge {
    display:inline-block; padding:3px 10px; border-radius:6px;
    font-size:0.75rem; font-weight:600; margin-left:8px;
  }
  .page-card .lang-badge {
    display:inline-block; padding:3px 8px; border-radius:4px;
    font-size:0.7rem; font-weight:600; margin-left:4px;
    background:#ffffff10; color:var(--muted);
  }
  .page-card h2 { font-size:1.4rem; font-weight:700; margin-bottom:4px; }
  .page-card .scenario-desc { color:var(--muted); font-size:0.9rem; margin-bottom:16px; line-height:1.7; }
  .page-card .command {
    background:#0d0f14; border:1px solid var(--border); border-radius:8px;
    padding:12px 16px; font-family:'Fira Code','Consolas',monospace;
    font-size:0.82rem; color:var(--blue); margin-bottom:20px; overflow-x:auto; white-space:pre-wrap;
  }

  .criteria-box {
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:16px 20px; margin-bottom:20px;
  }
  .criteria-box h3 { font-size:0.95rem; margin-bottom:10px; }
  .criteria-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  .criteria-item {
    background:#0d0f14; border-radius:8px; padding:12px;
  }
  .criteria-item .c-label { font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:4px; }
  .criteria-item .c-points { font-size:1.3rem; font-weight:700; color:var(--accent); }
  .criteria-item .c-desc { font-size:0.78rem; color:var(--muted); margin-top:4px; line-height:1.5; }

  .score-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
  .score-box {
    background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 20px;
  }
  .score-box .label { font-size:0.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:8px; }
  .score-box .value { font-size:2rem; font-weight:700; }
  .score-box .value.pass { color:var(--green); }
  .score-box .value.fail { color:var(--red); }
  .score-box .value.mid { color:var(--yellow); }
  .score-box .value.untested { color:var(--muted); }
  .score-box .sub { font-size:0.8rem; color:var(--muted); margin-top:4px; }

  .results-table { width:100%; border-collapse:collapse; margin-bottom:20px; }
  .results-table th {
    text-align:left; padding:8px 12px; font-size:0.75rem; font-weight:700;
    text-transform:uppercase; letter-spacing:0.04em; color:var(--muted);
    border-bottom:2px solid var(--border);
  }
  .results-table td { padding:8px 12px; font-size:0.85rem; border-bottom:1px solid var(--border); }

  .notes { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:20px; }
  .notes h3 { font-size:1rem; margin-bottom:8px; }
  .notes ul { margin-left:1.2rem; }
  .notes li { margin-bottom:4px; color:var(--muted); font-size:0.85rem; }
  .notes li strong { color:var(--text); }

  .version-entry { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:12px; }
  .version-entry .ver { font-size:0.85rem; font-weight:700; color:var(--accent); margin-bottom:4px; }
  .version-entry .changes { font-size:0.8rem; color:var(--muted); margin-top:4px; }

  .setup-box {
    background:#0d0f14; border:1px solid var(--border); border-radius:8px;
    padding:16px; margin-bottom:20px; font-family:'Fira Code','Consolas',monospace;
    font-size:0.8rem; color:var(--text); max-height:300px; overflow-y:auto;
    white-space:pre-wrap; line-height:1.5;
  }

  .nav-arrows { position:fixed; bottom:24px; right:24px; display:flex; gap:8px; z-index:100; }
  .nav-btn {
    width:44px; height:44px; border-radius:12px; border:1px solid var(--border);
    background:var(--card); color:var(--text); font-size:1.2rem;
    cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s;
  }
  .nav-btn:hover { background:var(--accent); border-color:var(--accent); }
  .nav-btn:disabled { opacity:0.3; cursor:not-allowed; }

  .kbd-hint {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    font-size:0.75rem; color:var(--muted); background:var(--card);
    padding:4px 12px; border-radius:6px; border:1px solid var(--border);
  }
  .kbd { display:inline-block; padding:1px 6px; border-radius:4px; background:#ffffff10; font-family:monospace; font-size:0.7rem; }

  .lang-toggle { display:flex; gap:2px; }
  .lang-toggle button {
    padding:4px 10px; border-radius:6px; border:1px solid var(--border);
    background:transparent; color:var(--muted); font-size:0.75rem; font-weight:700;
    cursor:pointer; transition:all 0.15s;
  }
  .lang-toggle button:hover { background:#ffffff08; }
  .lang-toggle button.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  .untested-msg { text-align:center; padding:60px 20px; color:var(--muted); }
  .untested-msg .icon { font-size:3rem; margin-bottom:12px; opacity:0.3; }
  .untested-msg p { font-size:1rem; }

  .overview-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-bottom:32px; }
  .overview-card {
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:20px; text-align:center;
  }
  .overview-card .oc-label { font-size:0.8rem; color:var(--muted); margin-bottom:8px; }
  .overview-card .oc-value { font-size:2.2rem; font-weight:700; }
  .overview-card .oc-sub { font-size:0.75rem; color:var(--muted); margin-top:4px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Coding Ability Quality Report</h1>
  <div class="tabs" id="tabsContainer"></div>
  <div class="lang-filter">
    <select id="langSelect" onchange="filterLang(this.value)"></select>
  </div>
  <div class="lang-toggle">
    <button id="btnKo" class="active" onclick="setUiLang('ko')">KO</button>
    <button id="btnEn" onclick="setUiLang('en')">EN</button>
  </div>
  <div class="summary-badges" id="summaryBadges"></div>
  <div class="page-info" id="pageInfo">-</div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content-area" id="contentArea"></div>
</div>

<div class="nav-arrows">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">&larr;</button>
  <button class="nav-btn" id="nextBtn" onclick="navigate(1)">&rarr;</button>
</div>
<div class="kbd-hint"><span class="kbd">&larr;</span> <span class="kbd">&rarr;</span> 키로 이동</div>

<script>
// =====================================================================
// CATEGORY DEFINITIONS
// =====================================================================
const categories = {
  tooluse:  { label:'Tool Usage',     color:'var(--blue)',     count:10 },
  bugfix:   { label:'Bug Fixing',     color:'var(--bugfix)',   count:25 },
  feature:  { label:'Feature Impl',   color:'var(--feature)',  count:20 },
  refactor: { label:'Refactoring',    color:'var(--refactor)', count:15 },
  analysis: { label:'Code Analysis',  color:'var(--analysis)', count:15 },
  debug:    { label:'Debugging',      color:'var(--debug)',    count:10 },
  review:   { label:'Code Review',    color:'var(--review)',   count:10 },
  testing:  { label:'Testing',        color:'var(--testing)',  count:5  },
};

// =====================================================================
// 110 CODING SCENARIOS (100 Coding + 10 Tool Usage)
// =====================================================================
const scenarios = [
  // ==================== TOOL USAGE (10) ====================
  { id:'tool-1', cat:'tooluse', name:'Bash 로그 파싱', diff:'medium', lang:'Bash',
    desc:'application.log 파일을 분석하여 ERROR/WARN/INFO 카운트, 에러 빈도 Top 5, 시간대별 에러 분포를 추출.',
    prompt:'이 디렉토리에 application.log 파일이 있어. bash 도구만 사용해서 로그 분석을 수행해줘.',
    criteria:{ correctness:'정확한 카운트와 분류', quality:'bash 명령 활용', completeness:'3개 분석 파일 모두 생성' },
    tests:[{version:'5.0.9-dev.0',date:'2026-03-13',cliScore:94,changes:'정확한 분석. 불필요한 clarification 질문 1회'},{version:'5.0.9-dev.2',date:'2026-03-13',cliScore:96,changes:'로그 분석 4개 파일 완벽 생성. ERROR/INFO/WARN 집계+Top3 에러+시간대별 빈도 정확'}] },
  { id:'tool-2', cat:'tooluse', name:'Bash 파일 시스템 분석', diff:'medium', lang:'Bash',
    desc:'파일 중복 탐지(MD5 해시), 빈 파일 탐색, 총 용량 계산, 확장자별 통계를 수행.',
    prompt:'이 디렉토리 구조를 분석해줘. 중복 파일, 빈 파일, 총 크기, 확장자별 통계.',
    criteria:{ correctness:'정확한 해시 기반 중복 탐지', quality:'bash 도구만 사용', completeness:'4개 분석 파일 모두 생성' },
    tests:[{version:'5.0.9-dev.0',date:'2026-03-13',cliScore:92,changes:'python→python3 에러 복구. analyze_files.py 아티팩트 잔류'},{version:'5.0.9-dev.2',date:'2026-03-13',cliScore:89,changes:'4개 분석 파일 생성 완료. 중복/빈파일/크기/확장자 집계 정확'},{version:'5.0.9-dev.3',date:'2026-03-13',cliScore:88,changes:'중복/빈파일/총크기/확장자별개수 올바르게 생성. 확장자 없는 파일(data,cache) 누락'},{version:'5.0.9-dev.3',date:'2026-03-13',cliScore:83,changes:'자기 출력파일을 total_size에 포함(1197 vs 288B). ext_count에서 무확장자 파일 누락'},{version:'5.0.9-dev.4',date:'2026-03-13',cliScore:78,changes:'total_size 3995B(정답 288). 에이전트 py 스크립트가 디렉토리 오염. ext_count에 .py:1 혼입'},{version:'5.0.9-dev.4',date:'2026-03-14',cliScore:78,changes:'analyze_files.py를 작업 디렉토리에 생성하여 total_size 오염(4306 vs 288). ext_count에 .py:1 혼입'},{version:'5.0.9-dev.5',date:'2026-03-14',cliScore:85,changes:'total_size=288 정확! 오염 해결. 단 .gitkeep/.placeholder 확장자 처리 불일치, 빈파일 중복그룹 포함'},{version:'5.0.9-dev.5',date:'2026-03-14',cliScore:97,changes:'중복3그룹/빈파일3개/총크기288B/확장자16개 완벽. 자기오염 없음. (no extension):4 정확 분류'}] },
  { id:'tool-3', cat:'tooluse', name:'Git merge + conflict resolution', diff:'hard', lang:'Git',
    desc:'main과 feature 브랜치 머지 시 config.json(port=feature), app.ts(양쪽 라우트), README(feature) 규칙으로 충돌 해결.',
    prompt:'feature/user-auth 브랜치를 main에 머지하고 충돌을 규칙에 따라 해결해줘.',
    criteria:{ correctness:'필드 단위 정밀 머지', quality:'브랜치별 값 보존', completeness:'모든 충돌 파일 해결' },
    tests:[{version:'5.0.9-dev.0',date:'2026-03-13',cliScore:85,changes:'config.json cacheEnabled 필드 누락 (FAIL)'},{version:'5.0.9-dev.0+prompt',date:'2026-03-13',cliScore:95,changes:'PRECISION 지침 적용 후 필드 단위 머지 성공'},{version:'5.0.9-dev.2',date:'2026-03-13',cliScore:88,changes:'3파일 Git 머지 충돌 해결 규칙 대체로 준수. config.json cacheEnabled 소실 정보 손실'},{version:'5.0.9-dev.3',date:'2026-03-13',cliScore:93,changes:'git merge 3개 충돌 규칙대로 해결+커밋 정확. README 제목 main값 잔존 미세 결함'}] },
  { id:'tool-4', cat:'tooluse', name:'Git cherry-pick + 브랜딩 보존', diff:'hard', lang:'Git',
    desc:'main의 2개 커밋을 enterprise 브랜치에 cherry-pick하되 브랜딩(enterprise-app, Enterprise App, .enterprise) 유지.',
    prompt:'main의 최근 2개 커밋을 enterprise에 cherry-pick하고 브랜딩을 유지해줘.',
    criteria:{ correctness:'2/2 cherry-pick 완료', quality:'브랜딩 정확 보존', completeness:'기능 코드 + 브랜딩 모두 정확' },
    tests:[{version:'5.0.9-dev.0',date:'2026-03-13',cliScore:55,changes:'타임아웃 300s. 1/2 cherry-pick만 완료 (FAIL)'},{version:'5.0.9-dev.0+prompt',date:'2026-03-13',cliScore:96,changes:'PRECISION+EFFICIENCY 지침 적용 후 2/2 완료'},{version:'5.0.9-dev.2',date:'2026-03-13',cliScore:98,changes:'cherry-pick 2커밋+enterprise 브랜딩 3개 값 완벽 보존. 기능 코드 올바르게 적용'}] },
  { id:'tool-5', cat:'tooluse', name:'Git release workflow', diff:'medium', lang:'Git',
    desc:'커밋 히스토리에서 CHANGELOG.md 생성, 버전 bump, release 브랜치, 태그 생성.',
    prompt:'릴리스 작업을 수행해줘. CHANGELOG, 버전 bump, release 브랜치, 태그.',
    criteria:{ correctness:'conventional commits 분류', quality:'정확한 버전/태그', completeness:'모든 요소 생성' },
    tests:[{version:'5.0.9-dev.0',date:'2026-03-13',cliScore:95,changes:'conventional commits 분류 정확. 모든 요소 생성 완료'},{version:'5.0.9-dev.2',date:'2026-03-13',cliScore:91,changes:'Git 릴리스 5개 작업(CHANGELOG,버전bump,브랜치,태그,커밋) 모두 정확히 완료'}] },
  { id:'tool-6', cat:'tooluse', name:'SSH NAS 헬스체크', diff:'medium', lang:'Bash/SSH',
    desc:'NAS에 SSH 접속하여 디스크/메모리/Docker/uptime 점검 후 판정 보고서 작성.',
    prompt:'NAS 서버에 SSH로 접속해서 상태 점검하고 health_report.txt를 만들어줘.',
    criteria:{ correctness:'4개 항목 정확 수집', quality:'판정 기준 적용', completeness:'종합 보고서 생성' },
    tests:[{version:'5.0.9-dev.0',date:'2026-03-13',cliScore:96,changes:'4개 항목 전부 정확 수집. 판정 기준 적용 완벽'},{version:'5.0.9-dev.2',date:'2026-03-13',cliScore:95,changes:'SSH NAS 헬스체크 4개 항목 수집+판정 기준 포함 107줄 보고서 완벽 생성'}] },
  { id:'tool-7', cat:'tooluse', name:'SSH rsync 배포 + 검증', diff:'hard', lang:'Bash/SSH',
    desc:'프로젝트를 NAS에 rsync 배포, 동기화 확인, 정리, 보고서 작성.',

function t(key) { return i18n[uiLang][key] || i18n['ko'][key] || key; }

function setUiLang(lang) {
  uiLang = lang;
  document.getElementById('btnKo').className = lang === 'ko' ? 'active' : '';
  document.getElementById('btnEn').className = lang === 'en' ? 'active' : '';
  buildTabs();
  buildLangSelect();
  updateSummaryBadges();
  renderSidebar();
  renderPage();
  document.querySelector('.kbd-hint').innerHTML = `<span class="kbd">&larr;</span> <span class="kbd">&rarr;</span> ${t('navHint')}`;
}

function buildLangSelect() {
  const langs = [...new Set(scenarios.map(s => s.lang))].sort();
  const select = document.getElementById('langSelect');
  let html = `<option value="all">${t('allLangs')}</option>`;
  langs.forEach(l => {
    const count = scenarios.filter(s => s.lang === l).length;
    html += `<option value="${l}" ${currentLang === l ? 'selected' : ''}>${l} (${count})</option>`;
  });
  select.innerHTML = html;
}

function getScoreClass(score) {
  if (score === null || score === undefined) return 'untested';
  if (score >= 90) return 'pass';
  if (score >= 75) return 'mid';
  return 'fail';
}

function buildTabs() {
  const container = document.getElementById('tabsContainer');
  let html = `<div class="tab${currentFilter==='all'?' active':''}" data-cat="all" onclick="filterCat('all')">${t('all')} (${scenarios.length})</div>`;
  for (const [key, cat] of Object.entries(categories)) {
    html += `<div class="tab${currentFilter===key?' active':''}" data-cat="${key}" onclick="filterCat('${key}')">${cat.label} (${cat.count})</div>`;
  }
  container.innerHTML = html;
}

function updateSummaryBadges() {
  const el = document.getElementById('summaryBadges');
  let pass=0, fail=0, untested=0;
  scenarios.forEach(s => {
    const latest = s.tests.length > 0 ? s.tests[s.tests.length-1] : null;
    if (!latest) { untested++; return; }
    const score = latest.cliScore ?? latest.score;
    if (score >= 90) pass++; else fail++;
  });
  el.innerHTML = `
    <span class="badge pass">${pass} PASS</span>
    <span class="badge fail">${fail} FAIL</span>
    <span class="badge untested">${untested} UNTESTED</span>
  `;
}

function applyFilters() {
  filteredScenarios = scenarios.filter(s => {
    const catMatch = currentFilter === 'all' || s.cat === currentFilter;
    const langMatch = currentLang === 'all' || s.lang === currentLang;
    return catMatch && langMatch;
  });
  currentIndex = 0;
  renderSidebar();
  renderPage();
}

function filterCat(cat) {
  currentFilter = cat;
  document.querySelectorAll('.tab').forEach(t => {
    t.className = 'tab';
    if (t.dataset.cat === cat) t.classList.add('active');
  });
  applyFilters();
}

function filterLang(lang) {
  currentLang = lang;
  applyFilters();
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';
  let lastCat = '';
  filteredScenarios.forEach((s, i) => {
    if (s.cat !== lastCat) {
      const cat = categories[s.cat];
      // Calculate category average
      const catScenarios = scenarios.filter(x => x.cat === s.cat);
      const tested = catScenarios.filter(x => x.tests.length > 0);
      let avgStr = '-';
      if (tested.length > 0) {
        const avg = tested.reduce((sum, x) => sum + (x.tests[x.tests.length-1].cliScore ?? x.tests[x.tests.length-1].score ?? 0), 0) / tested.length;
        avgStr = avg.toFixed(1) + t('score');
      }
      html += `<div class="cat-label" style="color:${catColors[s.cat]}">${cat.label} <span class="cat-avg">${avgStr}</span></div>`;
      lastCat = s.cat;
    }
    const latest = s.tests.length > 0 ? s.tests[s.tests.length-1] : null;
    const score = latest ? (latest.cliScore ?? latest.score) : null;
    const cls = getScoreClass(score);
    const num = s.id.split('-')[1];
    html += `<div class="scenario-item ${i === currentIndex ? 'active' : ''}" onclick="goTo(${i})">
      <div class="num ${cls}">${num}</div>
      <div class="label">${s.name}</div>
      <div class="diff ${s.diff}">${s.diff}</div>
    </div>`;
  });
  sb.innerHTML = html;
}

function renderPage() {
  const area = document.getElementById('contentArea');
  if (filteredScenarios.length === 0) {
    area.innerHTML = `<div class="untested-msg"><div class="icon">&#128269;</div><p>${t('noScenario')}</p></div>`;
    return;
  }

  const s = filteredScenarios[currentIndex];
  const latest = s.tests.length > 0 ? s.tests[s.tests.length-1] : null;
  const latestScore = latest ? (latest.cliScore ?? latest.score) : null;

  let html = `<div class="page-card">`;

  // Badges
  html += `<div>`;
  html += `<span class="cat-badge" style="background:${catColors[s.cat]}; color:#fff;">${categories[s.cat].label}</span>`;
  html += `<span class="diff-badge ${s.diff}" style="background:${s.diff==='easy'?'#00b89422':s.diff==='medium'?'#fdcb6e22':'#e1705522'}; color:${s.diff==='easy'?'var(--green)':s.diff==='medium'?'var(--yellow)':'var(--red)'};">${s.diff}</span>`;
  html += `<span class="lang-badge">${s.lang}</span>`;
  html += `</div>`;

  html += `<h2 style="margin-top:12px;">${s.name}</h2>`;
  html += `<div class="scenario-desc">${s.desc}</div>`;
  html += `<div class="command">${s.prompt}</div>`;

  // Criteria
  html += `<div class="criteria-box"><h3>${t('evalCriteria')}</h3><div class="criteria-grid">`;
  html += `<div class="criteria-item"><div class="c-label">Correctness</div><div class="c-points">40${t('score')}</div><div class="c-desc">${s.criteria.correctness}</div></div>`;
  html += `<div class="criteria-item"><div class="c-label">Code Quality</div><div class="c-points">30${t('score')}</div><div class="c-desc">${s.criteria.quality}</div></div>`;
  html += `<div class="criteria-item"><div class="c-label">Completeness</div><div class="c-points">30${t('score')}</div><div class="c-desc">${s.criteria.completeness}</div></div>`;
  html += `</div></div>`;

  // Score boxes
  html += `<div class="score-grid">
    <div class="score-box">
      <div class="label">${t('cliLatest')}</div>
      <div class="value ${getScoreClass(latestScore)}">${latestScore !== null ? latestScore + t('score') : t('notTested')}</div>
      <div class="sub">${latestScore !== null && latestScore >= 90 ? 'PASS' : latestScore !== null ? t('failBelow90') : t('testNeeded')}</div>
    </div>
    <div class="score-box">
      <div class="label">${t('electronLatest')}</div>
      <div class="value ${getScoreClass(latest ? latest.electronScore : null)}">${latest && latest.electronScore !== null && latest.electronScore !== undefined ? latest.electronScore + t('score') : t('notTested')}</div>
      <div class="sub">${latest && latest.electronScore >= 90 ? 'PASS' : latest && latest.electronScore ? t('failBelow90') : t('testNeeded')}</div>
    </div>
  </div>`;

  // Test history
  if (s.tests.length > 0) {
    html += `<h3 style="font-size:1.1rem; margin-bottom:12px;">${t('testHistory')}</h3>`;
    s.tests.slice().reverse().forEach(te => {
      const tScore = te.cliScore ?? te.score;
      html += `<div class="version-entry">
        <div class="ver">${te.version} — ${te.date}</div>
        <div style="display:flex; gap:24px; margin-top:4px;">
          <div>CLI: <span style="color:var(--${getScoreClass(tScore)}); font-weight:700;">${tScore}${t('score')}</span></div>
          <div>Electron: <span style="color:var(--${getScoreClass(te.electronScore)}); font-weight:700;">${te.electronScore !== null && te.electronScore !== undefined ? te.electronScore + t('score') : t('notTested')}</span></div>
        </div>
        ${te.changes ? `<div class="changes" style="margin-top:8px;">${te.changes}</div>` : ''}`;

      // Detail scores table if present
      if (te.details && te.details.length > 0) {
        html += `<table class="results-table" style="margin-top:12px;"><tr><th>${t('item')}</th><th>Correctness(40)</th><th>Quality(30)</th><th>Completeness(30)</th><th>${t('total')}</th></tr>`;
        te.details.forEach(d => {
          const total = d.correctness + d.quality + d.completeness;
          html += `<tr><td>${d.item}</td><td>${d.correctness}</td><td>${d.quality}</td><td>${d.completeness}</td><td style="color:var(--${getScoreClass(total)}); font-weight:700">${total}</td></tr>`;
        });
        html += `</table>`;
      }

      // Notes
      if (te.notes) {
        const notesList = Array.isArray(te.notes) ? te.notes : [te.notes];
        html += `<div class="notes" style="margin-top:12px;"><h3>${t('analysisNotes')}</h3><ul>`;
        notesList.forEach(n => html += `<li>${n}</li>`);
        html += `</ul></div>`;
      }

      html += `</div>`;
    });
  } else {
    html += `<div class="untested-msg"><div class="icon">&#9200;</div><p>${t('untestedMsg')}</p></div>`;
  }

  html += `</div>`;

  // Changelog (appended at bottom)
  html += '<div style="max-width:1000px; margin:40px auto 0;">';
  html += `<h3 style="font-size:1.1rem; margin-bottom:12px; padding-top:20px; border-top:1px solid var(--border);">${t('changelog')}</h3>`;
  changelog.forEach(cEntry => {
    html += `<div class="version-entry">
      <div class="ver">${cEntry.version} — ${cEntry.date}</div>
      <ul style="margin:8px 0 0 1.2rem;">`;
    cEntry.changes.forEach(c => {
      html += `<li style="font-size:0.8rem; color:var(--muted); margin-bottom:2px;">${c}</li>`;
    });
    html += '</ul></div>';
  });
  html += '</div>';

  area.innerHTML = html;

  // Update page info
  document.getElementById('pageInfo').textContent = `${currentIndex + 1} / ${filteredScenarios.length}`;

  // Update sidebar active
  document.querySelectorAll('.scenario-item').forEach((el, i) => {
    el.classList.toggle('active', i === currentIndex);
  });

  area.scrollTop = 0;
}

function goTo(index) {
  currentIndex = Math.max(0, Math.min(index, filteredScenarios.length - 1));
  renderSidebar();
  renderPage();
}

function navigate(dir) { goTo(currentIndex + dir); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { e.preventDefault(); navigate(-1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); navigate(1); }
});

// Initialize
buildTabs();
buildLangSelect();
updateSummaryBadges();
filterCat('all');
</script>
</body>
</html>

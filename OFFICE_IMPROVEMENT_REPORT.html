<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Tool Improvement Report</title>
<style>
  :root {
    --bg: #08090d; --bg2: #0e1018; --card: #141720; --card2: #1a1e2a;
    --border: #252a38; --border2: #333952;
    --text: #e4e6ee; --text2: #b0b5c8; --muted: #6b7194;
    --accent: #7c6aef; --accent2: #9d8df7; --accent-bg: #7c6aef18;
    --green: #22c997; --green-bg: #22c99715; --green-border: #22c99740;
    --red: #ef6a6a; --red-bg: #ef6a6a15; --red-border: #ef6a6a40;
    --yellow: #f0c54d; --yellow-bg: #f0c54d15; --yellow-border: #f0c54d40;
    --blue: #5fa0f5; --blue-bg: #5fa0f515;
    --ppt: #e04040; --word: #3b82f6; --excel: #22b573;
    --issue1: #ef6a6a; --issue2: #f0c54d; --issue3: #5fa0f5;
    --radius: 14px; --radius-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter','Segoe UI',-apple-system,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh; }

  /* ─── Header ─── */
  .header {
    position:sticky; top:0; z-index:100;
    background: linear-gradient(180deg, rgba(14,16,24,0.95) 0%, rgba(14,16,24,0.85) 100%);
    backdrop-filter: blur(24px) saturate(180%); -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-bottom:1px solid var(--border);
    padding:16px 32px; display:flex; align-items:center; justify-content:space-between;
  }
  .header::after {
    content:''; position:absolute; bottom:-1px; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, var(--accent) 30%, var(--accent) 70%, transparent);
    opacity:0.3;
  }
  .header-left { display:flex; align-items:center; gap:16px; }
  .header-left h1 { font-size:1.15rem; font-weight:700; letter-spacing:-0.02em; }
  .header-left .badge { font-size:0.7rem; font-weight:600; padding:3px 10px; border-radius:20px; background:var(--accent-bg); color:var(--accent2); border:1px solid #7c6aef30; }
  .header-right { display:flex; gap:6px; }
  .tab-btn {
    padding:7px 18px; border-radius:10px; cursor:pointer; font-size:0.82rem; font-weight:600;
    border:1px solid var(--border); background:transparent; color:var(--muted); transition:all 0.2s;
  }
  .tab-btn:hover { background:#ffffff06; color:var(--text2); }
  .tab-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 2px 12px #7c6aef40; }

  /* ─── Layout ─── */
  .container { max-width:1400px; margin:0 auto; padding:24px 32px 80px; }

  /* ─── Dashboard ─── */
  .dashboard { display:grid; grid-template-columns:repeat(4, 1fr); gap:16px; margin-bottom:32px; }
  .dash-card {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px 24px;
    position:relative; overflow:hidden;
  }
  .dash-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .dash-card.issue1::before { background:var(--issue1); }
  .dash-card.issue2::before { background:var(--issue2); }
  .dash-card.issue3::before { background:var(--issue3); }
  .dash-card .dash-label { font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); margin-bottom:8px; }
  .dash-card .dash-value { font-size:2.4rem; font-weight:800; letter-spacing:-0.03em; }
  .dash-card .dash-sub { font-size:0.8rem; color:var(--muted); margin-top:4px; }
  .dash-card:hover { border-color:var(--border2); transform:translateY(-2px); transition:all 0.3s; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
  .dash-value.green { color:var(--green); }
  .dash-value.red { color:var(--red); }
  .dash-value.yellow { color:var(--yellow); }
  .dash-value.muted { color:var(--muted); }

  /* ─── Section ─── */
  .section { margin-bottom:40px; }
  .section-header {
    display:flex; align-items:center; gap:12px; margin-bottom:20px; padding:16px 20px;
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    position:relative; overflow:hidden;
  }
  .section-header::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
  }
  .section.issue1-section .section-header::before { background:var(--issue1); }
  .section.issue2-section .section-header::before { background:var(--issue2); }
  .section.issue3-section .section-header::before { background:var(--issue3); }
  .section.ppt-section .section-header::before { background:var(--ppt); }
  .section.word-section .section-header::before { background:var(--word); }
  .section.excel-section .section-header::before { background:var(--excel); }
  .section-icon {
    width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    font-size:1.1rem; font-weight:700; flex-shrink:0;
  }
  .section-icon.issue1 { background:var(--red-bg); color:var(--red); border:1px solid var(--red-border); }
  .section-icon.issue2 { background:var(--yellow-bg); color:var(--yellow); border:1px solid var(--yellow-border); }
  .section-icon.issue3 { background:var(--blue-bg); color:var(--blue); border:1px solid #5fa0f540; }
  .section-icon.ppt { background:#e0404015; color:var(--ppt); border:1px solid #e0404040; }
  .section-icon.word { background:#3b82f615; color:var(--word); border:1px solid #3b82f640; }
  .section-icon.excel { background:#22b57315; color:var(--excel); border:1px solid #22b57340; }
  .section-title { font-size:1.15rem; font-weight:700; }
  .section-count { font-size:0.8rem; color:var(--muted); margin-left:auto; }

  /* ─── Scenario Card ─── */
  .scenario-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(420px, 1fr)); gap:14px; }
  .scenario-card {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:20px 24px; cursor:pointer; transition:all 0.2s;
    display:flex; flex-direction:column; gap:12px;
  }
  .scenario-card:hover { border-color:var(--border2); background:var(--card2); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.25); }
  .scenario-card .sc-top { display:flex; align-items:center; gap:10px; }
  .scenario-card .sc-num {
    width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center;
    font-size:0.75rem; font-weight:700; flex-shrink:0;
  }
  .sc-num.untested { background:#ffffff08; color:var(--muted); }
  .sc-num.pass { background:var(--green); color:#fff; }
  .sc-num.fail { background:var(--red); color:#fff; }
  .sc-num.partial { background:var(--yellow); color:#000; }
  .scenario-card .sc-name { font-size:0.92rem; font-weight:600; flex:1; }
  .scenario-card .sc-tools {
    display:flex; gap:4px;
  }
  .tool-tag {
    font-size:0.65rem; font-weight:700; padding:2px 8px; border-radius:5px;
    text-transform:uppercase; letter-spacing:0.04em;
  }
  .tool-tag.ppt { background:#e0404020; color:#f06060; }
  .tool-tag.word { background:#3b82f620; color:#6ea8f8; }
  .tool-tag.excel { background:#22b57320; color:#40d090; }
  .scenario-card .sc-desc { font-size:0.82rem; color:var(--text2); line-height:1.5; }
  .scenario-card .sc-cmd {
    font-family:'JetBrains Mono','Fira Code',monospace; font-size:0.75rem;
    background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:8px 12px; color:var(--blue); overflow-x:auto; white-space:nowrap;
  }
  .scenario-card .sc-expect {
    font-size:0.8rem; color:var(--muted); padding:8px 12px;
    background:var(--bg2); border-radius:var(--radius-sm); border-left:3px solid var(--accent);
  }
  .scenario-card .sc-result {
    display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;
  }
  .result-box {
    text-align:center; padding:8px; border-radius:var(--radius-sm);
    background:var(--bg); border:1px solid var(--border);
  }
  .result-box .rb-label { font-size:0.65rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; }
  .result-box .rb-value { font-size:1.3rem; font-weight:800; margin-top:2px; }
  .rb-value.untested { color:var(--muted); }

  /* ─── Detail Modal ─── */
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200;
    backdrop-filter:blur(4px); align-items:center; justify-content:center;
  }
  .modal-overlay.show { display:flex; }
  .modal {
    background:var(--card); border:1px solid var(--border); border-radius:18px;
    width:90%; max-width:800px; max-height:85vh; overflow-y:auto; padding:32px;
  }
  .modal h2 { font-size:1.3rem; font-weight:700; margin-bottom:16px; }
  .modal .close-btn {
    position:absolute; top:16px; right:20px; background:none; border:none;
    color:var(--muted); font-size:1.5rem; cursor:pointer;
  }

  /* ─── Responsive ─── */
  @media (max-width:1100px) {
    .dashboard { grid-template-columns:repeat(2,1fr); }
    .scenario-grid { grid-template-columns:1fr; }
  }
  @media (max-width:700px) {
    .dashboard { grid-template-columns:1fr; }
    .container { padding:16px; }
    .header { padding:12px 16px; flex-wrap:wrap; gap:8px; }
  }

  /* ─── Version History ─── */
  .version-list { display:flex; flex-direction:column; gap:8px; margin-top:12px; }
  .ver-item {
    background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:10px 14px; display:flex; align-items:center; gap:12px;
  }
  .ver-item .ver-tag { font-size:0.75rem; font-weight:700; color:var(--accent); min-width:90px; }
  .ver-item .ver-score { font-size:1rem; font-weight:800; min-width:50px; }
  .ver-item .ver-note { font-size:0.8rem; color:var(--muted); flex:1; }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--border2); }

  .hidden { display:none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Office Tool Improvement Report</h1>
    <span class="badge">v2.0 — 2026-03-26</span>
  </div>
  <div class="header-right">
    <button class="tab-btn active" onclick="showTab('all')">All</button>
    <button class="tab-btn" onclick="showTab('issues')">Issues</button>
    <button class="tab-btn" onclick="showTab('ppt')">PPT</button>
    <button class="tab-btn" onclick="showTab('word')">Word</button>
    <button class="tab-btn" onclick="showTab('excel')">Excel</button>
  </div>
</div>

<div class="container">
  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="dash-card">
      <div class="dash-label">Total Scenarios</div>
      <div class="dash-value muted" id="dashTotal">33</div>
      <div class="dash-sub" id="dashTotalSub">0 tested</div>
    </div>
    <div class="dash-card issue1">
      <div class="dash-label">Issue #1 — Close Bug</div>
      <div class="dash-value muted" id="dashI1">0 / 6</div>
      <div class="dash-sub">Create시 기존 문서 닫힘</div>
    </div>
    <div class="dash-card issue2">
      <div class="dash-label">Issue #2 — Page Control</div>
      <div class="dash-value muted" id="dashI2">0 / 9</div>
      <div class="dash-sub">페이지 수 / 콘텐츠 기반 제어</div>
    </div>
    <div class="dash-card issue3">
      <div class="dash-label">Issue #3 — Modify Quality</div>
      <div class="dash-value muted" id="dashI3">0 / 6</div>
      <div class="dash-sub">수정 품질 개선</div>
    </div>
  </div>

  <div id="content"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// SCENARIO DATA
// ═══════════════════════════════════════════════════════════════════

const scenarios = [

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // ISSUE #1: Create시 기존 문서 닫히는 문제 (6 scenarios)
  // Root cause: powerpointCreate()가 기존 프레젠테이션 전부 Close
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  { id:'i1-1', group:'issue1', tools:['ppt'],
    name:'PPT Create — 기존 1개 PPT 열린 상태',
    desc:'사용자가 이미 PPT 파일을 열어서 작업 중일 때, 새 PPT 생성 요청 시 기존 PPT가 닫히지 않아야 한다.',
    cmd:'# 수동 테스트: (1) PPT 파일 하나 열기 (2) hanseol-dev "새 PPT 만들어줘"',
    expect:'기존 프레젠테이션이 유지되고, 새 프레젠테이션이 추가로 생성됨. PowerPoint Presentations.Count >= 2',
    verify:'PowerShell: [Runtime.InteropServices.Marshal]::GetActiveObject("PowerPoint.Application").Presentations.Count',
    tests:[{version:'v5.3.12-dev.0',pass:true,score:100,note:'✅ PASS! existing-ppt.pptx 유지 + new-ppt.pptx(5장) 추가. Presentations.Count=2. powerpointCreate() Close루프 제거 효과 확인'}] },

  { id:'i1-2', group:'issue1', tools:['ppt'],
    name:'PPT Create — 기존 3개 PPT 열린 상태',
    desc:'3개의 PPT가 동시에 열려 있을 때, 새 PPT 생성 요청. 기존 3개 전부 유지되어야 한다.',
    cmd:'# 수동 테스트: (1) PPT 3개 열기 (2) hanseol-dev "새 피치덱 만들어줘"',
    expect:'기존 3개 프레젠테이션 + 새 1개 = 총 4개. 하나도 닫히지 않음.',
    verify:'Presentations.Count == 4, 기존 파일명 3개 모두 존재 확인',
    tests:[] },

  { id:'i1-3', group:'issue1', tools:['ppt'],
    name:'PPT Create 연속 2회 — 첫번째가 보존되는지',
    desc:'한설에게 PPT 2개를 연속으로 생성시킬 때, 첫번째 PPT가 두번째 생성시 닫히지 않아야 한다.',
    cmd:'hanseol-dev -ps "AI 소개 PPT 만들어줘" && hanseol-dev -ps "마케팅 PPT 만들어줘"',
    expect:'첫번째 PPT 파일이 여전히 열려 있고, 두번째도 생성됨. 총 2개 이상 프레젠테이션.',
    verify:'두 파일 모두 Presentations 목록에 존재',
    tests:[] },

  { id:'i1-4', group:'issue1', tools:['word'],
    name:'Word Create — 기존 Word 열린 상태 (기준선)',
    desc:'Word는 원래 기존 문서를 닫지 않아야 한다 (baseline 확인). 기존 Word 열린 상태에서 새 문서 생성.',
    cmd:'# (1) Word 파일 열기 (2) hanseol-dev "새 보고서 만들어줘"',
    expect:'기존 문서 유지 + 새 문서 추가. Documents.Count >= 2',
    verify:'PowerShell: GetActiveObject("Word.Application").Documents.Count',
    tests:[] },

  { id:'i1-5', group:'issue1', tools:['excel'],
    name:'Excel Create — 기존 Excel 열린 상태 (기준선)',
    desc:'Excel도 기존 문서를 닫지 않아야 한다 (baseline 확인). 기존 워크북 열린 상태에서 새 워크북 생성.',
    cmd:'# (1) Excel 파일 열기 (2) hanseol-dev "매출 표 만들어줘"',
    expect:'기존 워크북 유지 + 새 워크북 추가. Workbooks.Count >= 2',
    verify:'PowerShell: GetActiveObject("Excel.Application").Workbooks.Count',
    tests:[] },

  { id:'i1-6', group:'issue1', tools:['ppt','word','excel'],
    name:'크로스앱 — PPT+Word+Excel 동시 열린 상태에서 PPT 생성',
    desc:'Word와 Excel이 열린 상태에서 PPT를 생성해도 다른 앱에 영향이 없어야 한다.',
    cmd:'# (1) Word, Excel, PPT 각 1개씩 열기 (2) hanseol-dev "새 PPT 만들어줘"',
    expect:'Word, Excel 문서 모두 영향 없음. PPT에 새 프레젠테이션 추가.',
    verify:'각 앱의 Documents/Workbooks/Presentations Count 확인',
    tests:[] },


  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // ISSUE #2: 페이지 수 / 타겟 페이지 지정 (6 scenarios)
  // Root cause: Create 프롬프트가 하드코딩된 슬라이드 수 룰만 따름
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  { id:'i2-1', group:'issue2', tools:['ppt'],
    name:'PPT — "3장짜리 만들어줘"',
    desc:'사용자가 명시적으로 3장을 요청했을 때 정확히 3장 (표지+내용1+감사) 이 생성되어야 한다.',
    cmd:'hanseol-dev -ps "AI 소개 PPT 3장짜리로 만들어줘, C:\\temp\\ppt-3slides.pptx"',
    expect:'정확히 3장 생성. 10장 이상이면 실패. 표지 + 내용 1장 + 클로징 구성.',
    verify:'powerpoint_get_slide_count == 3',
    tests:[
      {version:'v5.3.12-dev.0-a',score:78,pass:false,note:'✅3장 생성. ❌Slide3 렌더실패→텍스트벽. 타이틀+클로징으로 콘텐츠 1장뿐'},
      {version:'v5.3.12-dev.0-b',score:82,pass:false,note:'✅Create agent 3장 콘텐츠 생성 성공! ❌Fallback agent가 4번째 클로징 추가. Slide3 렌더실패→텍스트폴백'},
      {version:'v5.3.12-dev.0-c',score:85,pass:false,note:'✅정확히 3장! 클로징 추가 안됨! ⚠Slide1 여전히 타이틀 형태. ⚠Slide3 이미지 삽입 반복 실패(인프라 이슈)→fallback agent 텍스트 재구성'},
      {version:'v5.3.12-dev.0-d',score:78,pass:false,note:'3장 정확. ✅Slide2 타임라인+5메트릭 매우 풍부. ❌Slide3 fallback 도형 겹침. ❌Slide1 여전히 타이틀 낭비. 마지막슬라이드 이미지삽입 인프라버그 반복 확인'}
    ] },

  { id:'i2-2', group:'issue2', tools:['ppt'],

  lang = l;

  document.getElementById('langEn').classList.toggle('active', l === 'en');

let currentFilter = 'all';
let currentIndex = 0;
let filteredScenarios = [...scenarios];

// =====================================================================
// RENDERING
// =====================================================================
function getScoreClass(score) {
  if (score === null || score === undefined) return 'untested';
  if (score >= 85) return 'pass';
  if (score >= 70) return 'mid';
  return 'fail';
}

function filterTool(tool) {
  currentFilter = tool;
  filteredScenarios = tool === 'all' ? [...scenarios] : scenarios.filter(s => s.tool === tool);
  currentIndex = 0;

  document.querySelectorAll('.tab').forEach(t => {
    t.className = 'tab';
    if (t.dataset.tool === tool) t.classList.add('active-' + (tool === 'all' ? 'ppt' : tool));
  });

  renderSidebar();
  renderPage();
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';
  let lastTool = '';
  filteredScenarios.forEach((s, i) => {
    if (s.tool !== lastTool) {
      const toolName = { ppt:'PowerPoint', word:'Word', excel:'Excel' }[s.tool];
      html += `<div class="tool-label">${toolName}</div>`;
      lastTool = s.tool;
    }
    const latestScore = s.tests.length > 0 ? s.tests[s.tests.length-1].cliScore : null;
    const cls = getScoreClass(latestScore);
    const num = s.id.split('-')[1];
    html += `<div class="scenario-item ${i === currentIndex ? 'active' : ''}" onclick="goTo(${i})">
      <div class="num ${cls}">${num}</div>
      <div class="label">${s.name}</div>
    </div>`;
  });
  sb.innerHTML = html;
}

function renderPage() {
  const area = document.getElementById('contentArea');
  if (filteredScenarios.length === 0) {
    area.innerHTML = `<div class="untested-msg"><div class="icon">&#128269;</div><p>${T('noScenarios')}</p></div>`;
    return;
  }

  const s = filteredScenarios[currentIndex];
  const latestCli = s.tests.length > 0 ? s.tests[s.tests.length-1].cliScore : null;
  const latestElectron = s.tests.length > 0 ? s.tests[s.tests.length-1].electronScore : null;
  const toolColor = { ppt:'ppt', word:'word', excel:'excel' }[s.tool];

  let html = `<div class="page-card">`;
  html += `<div class="tool-badge ${toolColor}">${s.tool.toUpperCase()}</div>`;
  html += `<h2>${s.name}</h2>`;
  html += `<div class="scenario-desc">${s.desc}</div>`;
  html += `<div class="command">${s.cmd}</div>`;

  // Score boxes
  html += `<div class="score-grid">
    <div class="score-box">
      <div class="label">${T('cliLatest')}</div>
      <div class="value ${getScoreClass(latestCli)}">${latestCli !== null ? latestCli + T('pts') : T('untested')}</div>
      <div class="sub">${latestCli !== null && latestCli >= 85 ? T('pass') : latestCli !== null ? T('fail') : T('needsTest')}</div>
    </div>
    <div class="score-box">
      <div class="label">${T('electronLatest')}</div>
      <div class="value ${getScoreClass(latestElectron)}">${latestElectron !== null ? latestElectron + T('pts') : T('untested')}</div>
      <div class="sub">${latestElectron !== null && latestElectron >= 85 ? T('pass') : latestElectron !== null ? T('fail') : T('needsTest')}</div>
    </div>
  </div>`;

  // Test history
  if (s.tests.length > 0) {
    html += `<h3 style="font-size:1.1rem; margin-bottom:12px;">${T('testHistory')}</h3>`;
    s.tests.slice().reverse().forEach(t => {
      html += `<div class="version-entry">
        <div class="ver">${t.version} — ${t.date}</div>
        <div style="display:flex; gap:24px;">
          <div>CLI: <span class="score" style="color:var(--${getScoreClass(t.cliScore)})">${t.cliScore}${T('pts')}</span></div>
          <div>Electron: <span class="score" style="color:var(--${getScoreClass(t.electronScore)})">${t.electronScore !== null ? t.electronScore + T('pts') : T('untested')}</span></div>
        </div>
        ${t.changes ? `<div class="changes">${t.changes}</div>` : ''}
      </div>`;

      // Per-slide table if available
      if (t.slides && t.slides.length > 0) {
        const hasBreakdown = t.slides[0].content !== undefined;
        if (hasBreakdown) {
          html += `<table class="results-table"><tr><th>${T('slideCol')}</th><th>${T('titleCol')}</th><th>${T('contentCol')}</th><th>${T('designCol')}</th><th>${T('fillCol')}</th><th>${T('totalCol')}</th></tr>`;
          t.slides.forEach(sl => {
            const total = sl.content + sl.design + sl.fill;
            html += `<tr><td>${sl.num}</td><td>${sl.title||''}</td><td>${sl.content}</td><td>${sl.design}</td><td>${sl.fill}</td><td style="color:var(--${getScoreClass(total)}); font-weight:700">${total}</td></tr>`;
          });
          html += `</table>`;
        } else {
          const scoreLabel = lang === 'en' ? 'Score' : '점수';
          const noteLabel = lang === 'en' ? 'Note' : '비고';
          html += `<table class="results-table"><tr><th>${T('slideCol')}</th><th>${T('titleCol')}</th><th>${scoreLabel}</th><th>${noteLabel}</th></tr>`;
          t.slides.forEach(sl => {
            const sc = sl.score;
            html += `<tr><td>${sl.num}</td><td>${sl.title||''}</td><td style="color:var(--${getScoreClass(sc)}); font-weight:700">${sc}</td><td style="color:var(--muted)">${sl.note||''}</td></tr>`;
          });
          html += `</table>`;
        }
      }

      // Notes
      if (t.notes) {
        const notesList = Array.isArray(t.notes) ? t.notes : [t.notes];
        html += `<div class="notes"><h3>${T('analysisNotes')}</h3><ul>`;
        notesList.forEach(n => html += `<li>${n}</li>`);
        html += `</ul></div>`;
      }
    });
  } else {
    html += `<div class="untested-msg"><div class="icon">&#9200;</div><p>${T('untestedMsg')}</p></div>`;
  }

  html += `</div>`;
  area.innerHTML = html;

  // Update page info
  document.getElementById('pageInfo').textContent = `${currentIndex + 1} / ${filteredScenarios.length}`;

  // Update sidebar active
  document.querySelectorAll('.scenario-item').forEach((el, i) => {
    el.classList.toggle('active', i === currentIndex);
  });

  // Scroll to top
  area.scrollTop = 0;
}

function goTo(index) {
  currentIndex = Math.max(0, Math.min(index, filteredScenarios.length - 1));
  renderPage();
  renderSidebar();
}

function navigate(dir) {
  goTo(currentIndex + dir);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { e.preventDefault(); navigate(-1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); navigate(1); }
});

let currentTab = 'all';

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick="showTab('${tab}')"]`).classList.add('active');
  render();
}

function getTestScore(t) {
  return t.score ?? t.cliScore ?? null;
}

function getStatus(scenario) {
  if (!scenario.tests || scenario.tests.length === 0) return 'untested';
  const last = scenario.tests[scenario.tests.length - 1];
  if (last.pass === true) return 'pass';
  if (last.pass === false) return 'fail';
  const sc = getTestScore(last);
  if (sc != null) {
    if (sc >= 85) return 'pass';
    if (sc >= 70) return 'partial';
    return 'fail';
  }
  return 'untested';
}

function getScore(scenario) {
  if (!scenario.tests || scenario.tests.length === 0) return null;
  const last = scenario.tests[scenario.tests.length - 1];
  return getTestScore(last);
}

function getFiltered() {
  if (currentTab === 'all') return scenarios;
  if (currentTab === 'issues') return scenarios.filter(s => s.group.startsWith('issue'));
  if (currentTab === 'ppt') return scenarios.filter(s => s.group === 'ppt');
  if (currentTab === 'word') return scenarios.filter(s => s.group === 'word');
  if (currentTab === 'excel') return scenarios.filter(s => s.group === 'excel');
  return scenarios;
}

const groupMeta = {
  issue1: { icon:'1', iconClass:'issue1', title:'Issue #1 — Create시 기존 문서 닫히는 문제', desc:'powerpointCreate()가 기존 Presentations를 전부 Close하는 버그' },
  issue2: { icon:'2', iconClass:'issue2', title:'Issue #2 — 페이지 수 / 콘텐츠 기반 제어 안됨', desc:'"3장만 만들어줘", "이 내용으로 1페이지만 만들어줘" 같은 명시적 페이지 수 요청이 무시됨' },
  issue3: { icon:'3', iconClass:'issue3', title:'Issue #3 — 수정 품질 << 생성 품질', desc:'Modify 프롬프트가 Create 대비 10분의 1 수준으로 빈약' },
  ppt:    { icon:'P', iconClass:'ppt', title:'General — PowerPoint', desc:'일반 PPT 생성 시나리오' },

  excel:  { icon:'E', iconClass:'excel', title:'General — Excel', desc:'일반 Excel 생성 시나리오' },
};

function renderCard(s, idx) {
  const status = getStatus(s);
  const score = getScore(s);
  const toolTags = s.tools.map(t => `<span class="tool-tag ${t}">${t}</span>`).join('');
  const scoreDisplay = score != null ? score.toFixed(1) : '—';
  const lastTest = (s.tests && s.tests.length > 0) ? s.tests[s.tests.length - 1] : null;
  const versionDisplay = lastTest ? lastTest.version : '—';
  const timeDisplay = lastTest && lastTest.time ? lastTest.time + 's' : '—';

  let versionsHtml = '';
  if (s.tests && s.tests.length > 0) {
    versionsHtml = '<div class="version-list">';
    s.tests.forEach(t => {
      const tsc = getTestScore(t);
      const sc = tsc != null ? tsc.toFixed(1) : (t.pass ? 'PASS' : 'FAIL');
      const cls = t.pass === true || (tsc && tsc >= 85) ? 'green' : (t.pass === false || (tsc && tsc < 70) ? 'red' : 'yellow');
      versionsHtml += `<div class="ver-item">
        <span class="ver-tag">${t.version || '—'}</span>
        <span class="ver-score" style="color:var(--${cls})">${sc}</span>
        <span class="ver-note">${t.note || ''}</span>
      </div>`;
    });
    versionsHtml += '</div>';
  }

  return `<div class="scenario-card" id="card-${s.id}">
    <div class="sc-top">
      <div class="sc-num ${status}">${idx+1}</div>
      <div class="sc-name">${s.name}</div>
      ${toolTags}
    </div>
    <div class="sc-desc">${s.desc}</div>
    <div class="sc-cmd">${s.cmd}</div>
    ${s.expect ? `<div class="sc-expect"><strong>Expected:</strong> ${s.expect}</div>` : ''}
    <div class="sc-result">
      <div class="result-box"><div class="rb-label">Score</div><div class="rb-value ${status}">${scoreDisplay}</div></div>
      <div class="result-box"><div class="rb-label">Version</div><div class="rb-value untested" style="font-size:0.9rem">${versionDisplay}</div></div>
      <div class="result-box"><div class="rb-label">Time</div><div class="rb-value untested" style="font-size:0.9rem">${timeDisplay}</div></div>
    </div>
    ${versionsHtml}
  </div>`;
}

function render() {
  const filtered = getFiltered();
  const content = document.getElementById('content');

  // Group scenarios
  const groups = {};
  filtered.forEach(s => {
    if (!groups[s.group]) groups[s.group] = [];
    groups[s.group].push(s);
  });

  let html = '';
  const groupOrder = ['issue1','issue2','issue3','ppt','word','excel'];
  for (const g of groupOrder) {
    if (!groups[g]) continue;
    const meta = groupMeta[g];
    const items = groups[g];
    const tested = items.filter(s => s.tests && s.tests.length > 0).length;
    const passed = items.filter(s => getStatus(s) === 'pass').length;

    html += `<div class="section ${g}-section">
      <div class="section-header">
        <div class="section-icon ${meta.iconClass}">${meta.icon}</div>
        <div>
          <div class="section-title">${meta.title}</div>
          <div style="font-size:0.8rem; color:var(--muted); margin-top:2px;">${meta.desc}</div>
        </div>
        <div class="section-count">${passed}/${items.length} passed &middot; ${tested} tested</div>
      </div>
      <div class="scenario-grid">
        ${items.map((s, i) => renderCard(s, scenarios.indexOf(s))).join('')}
      </div>
    </div>`;
  }

  content.innerHTML = html;
  updateDashboard();
}

function updateDashboard() {
  const total = scenarios.length;
  const tested = scenarios.filter(s => s.tests && s.tests.length > 0).length;
  const passed = scenarios.filter(s => getStatus(s) === 'pass').length;
  document.getElementById('dashTotal').textContent = total;
  document.getElementById('dashTotal').className = 'dash-value ' + (tested === 0 ? 'muted' : (passed === total ? 'green' : 'yellow'));
  document.getElementById('dashTotalSub').textContent = `${tested} tested, ${passed} passed`;

  for (const g of ['issue1','issue2','issue3']) {
    const items = scenarios.filter(s => s.group === g);
    const count = items.length;
    const p = items.filter(s => getStatus(s) === 'pass').length;
    const el = document.getElementById('dashI' + g.replace('issue',''));
    el.textContent = `${p} / ${count}`;
    el.className = 'dash-value ' + (p === 0 ? 'muted' : (p === count ? 'green' : 'yellow'));
  }
}
